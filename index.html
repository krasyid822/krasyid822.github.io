    <style>
        :root {
            --primary-font: "Montserrat", sans-serif;
            --title-font: "Sofadi One", system-ui;
            --background-color: #f0f2f5;
            --card-background: #ffffff;
            --text-color: #333333;
            --muted-color: #64748b;
            --border-color: rgba(15, 23, 42, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --accent-color: #007bff;
            --accent-soft: rgba(0, 123, 255, 0.12);
        }

        body {
            font-family: var(--primary-font);
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Smooth transitions when switching themes */
        body, .shortcut-card {
            transition: background-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
        }

        h1 {
            font-family: var(--title-font);
            font-weight: 400;
            font-style: normal;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        #shortcut-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .shortcut-card {
            background-color: var(--card-background);
            border-radius: 12px;
            box-shadow: 0 4px 8px var(--shadow-color);
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .shortcut-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px var(--shadow-color);
        }

        .shortcut-card img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .shortcut-card span {
            font-weight: 600;
            font-size: 1rem;
        }

        .shortcut-card small {
            width: 100%;
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }

        .empty-state {
            width: 100%;
            max-width: 1200px;
            padding: 18px;
            border-radius: 14px;
            border: 1px dashed var(--border-color);
            background: var(--card-background);
            color: var(--muted-color);
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }

        .footer-feature {
            background-color: var(--card-background);
            padding: 20px;
            margin-top: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 8px var(--shadow-color);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        /* Header and dark mode toggle */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 16px;
        }

        .dark-toggle { display: inline-flex; align-items: center; }

        /* Simple toggle switch */
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .2s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px;
            background-color: white; transition: .2s; border-radius: 50%;
        }
        .switch input:checked + .slider { background-color: var(--accent-color); }
        .switch input:checked + .slider:before { transform: translateX(20px); }

        /* Toggle icon */
        .toggle-icon {
            width: 20px; height: 20px; display: inline-block; margin-left: 8px; background-size: contain; background-repeat: no-repeat; background-position: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .toggle-icon:hover {
            transform: scale(1.2);
        }

        /* Container state to switch icon via JS */
        .dark-toggle.on .toggle-icon {
            /* moon icon */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23F5F7FA"><path d="M21 12.79A9 9 0 0111.21 3 7 7 0 1021 12.79z"/></svg>');
        }
        .dark-toggle:not(.on) .toggle-icon {
            /* sun icon */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23FDBA74"><path d="M6.76 4.84l-1.8-1.79L3.17 4.84l1.79 1.79 1.8-1.79zM1 13h3v-2H1v2zm10 9h2v-3h-2v3zM17.24 19.16l1.8 1.79 1.79-1.79-1.79-1.79-1.8 1.79zM20 11v2h3v-2h-3zM12 5a7 7 0 100 14 7 7 0 000-14zM4.22 17.66l1.79-1.79-1.79-1.8-1.79 1.8 1.79 1.79zM17.66 6.34l1.79-1.79L17.66 2.76l-1.79 1.79 1.79 1.79z"/></svg>');
        }

        /* Light theme overrides */
        body:not(.dark)[data-theme="bluemoon"] {
            --background-color: #f0f4ff;

            --text-color: #1e293b;

        body:not(.dark)[data-theme="emerald"] {
            --background-color: #f0fdf4;
            --card-background: #ffffff;
            --text-color: #064e3b;
            --muted-color: #0f766e;
            --border-color: rgba(15, 118, 110, 0.08);

            --accent-color: #047857;
            --accent-soft: rgba(4, 120, 87, 0.1);
        }

        /* Dark theme overrides — base for dark, then per-variant overrides via data-theme */
        body.dark[data-theme="soft"] {
            --background-color: #0b1228; /* deep muted blue-gray */
            --card-background: #0f1a2b;
            --text-color: #d5e6f3;
            --muted-color: #8ea6be;
            --border-color: rgba(255,255,255,0.08);
            --shadow-color: rgba(2,6,23,0.5);
            --accent-color: #4fb3ff;
            --accent-soft: rgba(79, 179, 255, 0.14);
        }
        body.dark[data-theme="dim"] {
            --background-color: #16120f; /* warm, very dark */
            --card-background: #221b18;  /* warm card */
            --text-color: #efe6db;      /* warm cream */
            --muted-color: #d2b79f;
            --border-color: rgba(255,255,255,0.08);
            --shadow-color: rgba(0,0,0,0.6);
            --accent-color: #ffb86b;    /* warm amber accent */
            --accent-soft: rgba(255, 184, 107, 0.14);
        }
        body.dark[data-theme="amoled"] {
            --background-color: #000000; /* pure black */
            --card-background: #000000;   /* pure black cards */
            --text-color: #e6eef8;        /* light text */

    </style>

    <script>

        // --- Dynamic Shortcut Generation ---
        const container = document.getElementById('shortcut-container');

        // Create toggle card first
        const toggleCard = document.createElement('div');
        toggleCard.className = 'shortcut-card toggle-card';
        toggleCard.innerHTML = `
            <div class="dark-toggle" title="Toggle dark mode" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                <div id="darkModeTitle" style="font-weight: 600; font-size: 1rem;">Dark Mode</div>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle" aria-label="Toggle dark mode">
                    <span class="slider"></span>
                </label>
                <span class="toggle-icon" aria-hidden="true" style="width: 24px; height: 24px;"></span>
            </div>
        `;
        container.appendChild(toggleCard);

        // --- Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                .then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);

                    // Handle updates
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New version available
                                if (confirm('Versi baru tersedia! Muat ulang untuk memperbarui?')) {
                                    window.location.reload();
                                }
                            }
                        });
                    });
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        // --- Clipboard Function ---
        function copyToClipboard() {
            const text = document.getElementById("textToCopy").value;
            const message = document.getElementById("copyMessage");
            navigator.clipboard.writeText(text).then(() => {
                message.textContent = "Teks berhasil disalin!";
                setTimeout(() => { message.textContent = ""; }, 2000); // Clear message after 2 seconds
            }, () => {
                message.textContent = "Gagal menyalin teks.";
                message.style.color = "red";
            });
        }

        // --- Dark mode init (with variant + icon) ---
        function initDarkMode() {
            const toggle = document.getElementById('darkModeToggle');
            const icon = document.querySelector('.toggle-icon');
            const container = document.querySelector('.dark-toggle');
            const title = document.getElementById('darkModeTitle');
            if (!toggle || !icon || !container || !title) return;

            const savedEnabled = localStorage.getItem('darkMode') === 'true';
            const savedDarkVariant = localStorage.getItem('darkTheme') || 'soft';
            const savedLightVariant = localStorage.getItem('lightTheme') || 'default';

            function updateUI(enabled, darkVariant, lightVariant) {
                document.body.classList.toggle('dark', enabled);
                container.classList.toggle('on', enabled);
                toggle.checked = enabled;
                
                if (enabled) {
                    document.body.setAttribute('data-theme', darkVariant);
                    const variantLabel = darkVariant.charAt(0).toUpperCase() + darkVariant.slice(1);
                    title.textContent = `Dark Mode (${variantLabel})`;
                    icon.title = `Klik untuk ganti tema (aktif: ${variantLabel})`;
                } else {
                    if (lightVariant === 'default') {
                        document.body.removeAttribute('data-theme');
                        title.textContent = 'Light Mode (Default)';
                    } else {
                        document.body.setAttribute('data-theme', lightVariant);
                        const variantLabel = lightVariant === 'bluemoon' ? 'Blue Moon' : lightVariant.charAt(0).toUpperCase() + lightVariant.slice(1);
                        title.textContent = `Light Mode (${variantLabel})`;
                    }
                    const nextLight = getNextLightVariant(lightVariant);
                    const nextLightLabel = nextLight === 'default' ? 'Default' : nextLight === 'bluemoon' ? 'Blue Moon' : nextLight.charAt(0).toUpperCase() + nextLight.slice(1);
                    icon.title = `Klik untuk ganti tema terang (berikutnya: ${nextLightLabel})`;
                }
            }

            function getNextLightVariant(current) {
                if (current === 'default') return 'bluemoon';
                if (current === 'bluemoon') return 'gold';
                if (current === 'gold') return 'emerald';
                return 'default';
            }

            // Apply saved state
            updateUI(savedEnabled, savedDarkVariant, savedLightVariant);

            // Toggle change
            toggle.addEventListener('change', () => {
                const enabled = toggle.checked;
                const darkVariant = localStorage.getItem('darkTheme') || 'soft';
                const lightVariant = localStorage.getItem('lightTheme') || 'default';
                localStorage.setItem('darkMode', enabled);
                updateUI(enabled, darkVariant, lightVariant);
            });

            // Cycle theme variant on icon click
            icon.addEventListener('click', () => {
                const enabled = toggle.checked;
                const darkVariant = localStorage.getItem('darkTheme') || 'soft';
                const lightVariant = localStorage.getItem('lightTheme') || 'default';
                
                if (enabled) {
                    let nextDark = 'soft';
                    if (darkVariant === 'soft') nextDark = 'dim';
                    else if (darkVariant === 'dim') nextDark = 'amoled';
                    
                    localStorage.setItem('darkTheme', nextDark);
                    updateUI(true, nextDark, lightVariant);
                } else {
                    const nextLight = getNextLightVariant(lightVariant);
                    localStorage.setItem('lightTheme', nextLight);
                    updateUI(false, darkVariant, nextLight);
                }
            });
        }

        // initialize dark mode immediately
        initDarkMode();
    </script>
